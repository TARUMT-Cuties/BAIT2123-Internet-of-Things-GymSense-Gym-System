<!DOCTYPE html>
<html>
<head>

<title>Workout Mode</title>
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="workout-container">

<h1 class="title">Workout Mode</h1>

<div class="exercise-name" id="exercise">
Squats
</div>


<div class="rep-card">

<div id="reps" class="rep-number">
0
</div>

<div class="rep-label">
REPS
</div>

<div class="rir">
<span id="rir">3</span> reps before muscle limit
</div>

</div>


<div class="stats-row">

<div class="stat-box">
<h3>Set</h3>
<p id="set">1 / 4</p>
</div>

<div class="stat-box">
<h3>Calories</h3>
<p id="calories">0</p>
</div>

<div class="stat-box">
    <h3>Time</h3>
    <p id="stopwatch">00:00</p>
</div>

</div>

<div class="controls">

<button id="pauseBtn">Pause</button>

<button id="resumeBtn">Resume</button>

</div>


<button id="endButton" class="end-btn">
End Workout
</button>

<p id="endingText"></p>

</div>

<script src="js/workout.js"></script>

</body>
</html>
