<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Sensor placement overlay — shown before each new exercise -->
<div id="placementOverlay" class="placement-overlay">
    <div class="placement-card">
        <div class="placement-tag">Sensor Setup</div>
        <div class="placement-exercise" id="placementExercise"></div>
        <div class="placement-steps">
            <div class="placement-step">
                <span class="step-label">WHERE</span>
                <span id="placementWhere"></span>
            </div>
            <div class="placement-step">
                <span class="step-label">HOW</span>
                <span id="placementHow"></span>
            </div>
        </div>
        <button id="readyBtn" class="ready-btn">&#10003; I'm Ready</button>
    </div>
</div>

<div class="workout-container">

    <h1>Workout Mode</h1>

    <div class="exercise-name" id="exercise">Squats</div>

    <div class="rep-card">
        <div id="reps" class="rep-number">0</div>
        <div class="rep-label">REPS</div>
        <div class="rir"><span id="rir">3</span> reps until set completion</div>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <h3>Set</h3>
            <p id="set">1 / 4</p>
        </div>
        <div class="stat-box">
            <h3>Calories</h3>
            <p id="calories">0</p>
        </div>
        <div class="stat-box">
            <h3>Time</h3>
            <p id="stopwatch">00:00</p>
        </div>
    </div>

    <div class="controls">
        <button id="pauseBtn">Pause</button>
        <button id="resumeBtn">Resume</button>
    </div>

    <button id="endButton" class="end-btn">End Workout</button>

    <p id="endingText"></p>

</div>

<script src="js/workout.js"></script>

</body>
</html>
