<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSense Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="dashboard">

    <header>
        <h1>GymSense</h1>
        <p class="subtitle">Welcome back</p>
    </header>

    <section class="overview">
        <div class="card">
            <h3>Total Reps</h3>
            <p id="repsStat">0</p>
        </div>
        <div class="card">
            <h3>Calories</h3>
            <p id="caloriesStat">0</p>
        </div>
        <div class="card">
            <h3>Workouts</h3>
            <p id="streakStat">0</p>
        </div>
    </section>

    <section class="live-sensor">
        <div class="card">
            <h3>Live Sensor</h3>
            <p id="sensorExercise">--</p>
            <p id="sensorReps">Reps: --</p>
            <p id="sensorStatus">Connecting...</p>
        </div>
    </section>

    <section class="charts">
        <div class="chart-card">
            <h3>Weekly Activity</h3>
            <canvas id="weeklyChart"></canvas>
        </div>
        <div class="chart-card">
            <h3>Exercise Distribution</h3>
            <canvas id="exerciseChart"></canvas>
        </div>
    </section>

    <section class="start-workout">
        <button id="startButton">Start Workout</button>
        <p id="loadingText"></p>
    </section>

    <section class="report-section" style="text-align: center; margin: 20px 0;">
        <button id="downloadReport" class="btn-report">Download Progress Report (PDF)</button>
    </section>

    <section class="workout-history">
        <h2>Workout History</h2>
        <div class="history-table-wrapper">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Exercise</th>
                        <th>Reps</th>
                        <th>Set</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                    <tr class="empty-state">
                        <td colspan="5">No workout history yet</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</div>

<script src="js/dashboard.js"></script>
<script src="js/charts.js"></script>

</body>
</html>
