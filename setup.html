<!DOCTYPE html>
<html>
<head>

    <title>Workout Setup</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="setup-container">

        <h1 class="setup-title">Workout Setup</h1>

        <div class="setup-card">

        <div class="form-group">
            <label>Select Exercises</label>

            <div class="exercise-list">

                <label>
                    <input type="checkbox" value="Squats">
                    Squats
                </label>

                <label>
                    <input type="checkbox" value="Arm Curl">
                    Arm Curl
                </label>

                <label>
                    <input type="checkbox" value="Ankle Lift">
                    Ankle Lift
                </label>

            </div>
        </div>


            <div class="form-group">
                <label for="sets">Number of Sets</label>

                <input
                    type="number"
                    id="sets"
                    min="1"
                    max="10"
                    value="4"
                >
            </div>


            <div class="form-group">
                <label for="targetReps">Reps per Set</label>

                <input
                    type="number"
                    id="targetReps"
                    min="1"
                    max="50"
                    value="12"
                >
            </div>


            <button id="startWorkoutBtn" class="start-btn">
                Start Workout
            </button>

        </div>

    </div>

    <script src="js/setup.js"></script>

</body>
</html>
