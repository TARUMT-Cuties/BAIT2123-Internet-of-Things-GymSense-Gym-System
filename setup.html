<!DOCTYPE html>
<html>

<head>
    <title>Workout Setup</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="setup-container">

        <div>

            <h1 class="setup-title">Workout Setup</h1>

            <div id="lastWorkoutCard" class="setup-card" style="margin-bottom:20px; display:none;">

                <h2>Last Workout</h2>

                <div id="lastWorkoutContent"></div>

                <button id="repeatWorkoutBtn" class="start-btn">
                    Repeat Last Workout
                </button>

            </div>

            <div class="setup-card">

                <div class="form-group">

                    <label>Select Exercises</label>

                    <div class="exercise-list">

                        <label class="exercise-card">
                            <input type="checkbox" class="setupCheckbox" value="Squats">
                            <span>Squats</span>
                        </label>

                        <label class="exercise-card">
                            <input type="checkbox" class="setupCheckbox" value="Arm Curl">
                            <span>Arm Curl</span>
                        </label>

                        <label class="exercise-card">
                            <input type="checkbox" class="setupCheckbox" value="Ankle Lift">
                            <span>Ankle Lift</span>
                        </label>

                    </div>

                </div>

                <div id="exerciseConfig" class="exercise-config"></div>

                <button id="startWorkoutBtn" class="start-btn">
                    Start Workout
                </button>

            </div>

        </div>

    </div>

    <script src="js/setup.js"></script>

</body>

</html>
