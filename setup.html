<!DOCTYPE html>
<html>
<head>
    <title>Workout Setup</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="setup-container">

<div>

<h1 class="setup-title">Workout Setup</h1>

<div id="lastWorkoutCard" class="setup-card" style="margin-bottom:20px; display:none;">
<h2>Last Workout</h2>
<div id="lastWorkoutContent"></div>
</div>

<div class="setup-card">

<div class="form-group">

<label>Select Exercises</label>

<div class="exercise-list">

<label>
<input type="checkbox" value="Squats">
Squats
</label>

<label>
<input type="checkbox" value="Arm Curl">
Arm Curl
</label>

<label>
<input type="checkbox" value="Ankle Lift">
Ankle Lift
</label>

</div>

</div>

<div id="exerciseConfig" class="exercise-config"></div>

<button id="startWorkoutBtn" class="start-btn">
Start Workout
</button>

</div>

</div>

</div>

<script src="js/setup.js"></script>

</body>
</html>
